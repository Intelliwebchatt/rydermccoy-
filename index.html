<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const BRAND = {
  name: 'Ryder McCoy',
  tagline: "We’re not entertainers. We’re reporters from the brink.",
  sub: 'Southern Gothic Trap · Backroad Gospel · Alabama Field Reports',
  location: 'Slapout, Montgomery, Wetumpka, Deatsville — recorded where the porch lights hum and the road runs out.',
};

const NAV = [
  { id: 'story', label: 'The Story' },
  { id: 'catalog', label: 'The Warning' },
  { id: 'player', label: 'Player' },
  { id: 'field-reports', label: 'Field Reports' },
];

const TRACKS = [
  { no:'01', title:'The Warning', audio:'audio/01-the-warning.mp3', vibe:'Apocalyptic backroad opener', key:'Em', characters:'Ryder, Unc, the Beast', duration:'4:31', note:'A storm-lit opener where Ryder crawls through a drug vision, a dirt-road apocalypse, and the kind of judgment that may be coming from God, the glass, or his own burned-out nervous system.', quote:'This ain’t a story… it’s a warning.' },
  { no:'02', title:'Out of That Life', audio:'audio/02-out-of-that-life.mp3', vibe:'Montgomery escape hymn', key:'Am', characters:'Ryder, Jessie, Unc, Crank, Worm', duration:'4:12', note:'A storm-lit Montgomery track about wanting out while the old life keeps speaking through glass pipes, trailer-park paranoia, empty syringes, and motel-sign prophecy.', quote:'The Gospel’s an echo in the empty syringe.' },
  { no:'03', title:'That Girl Named Lost', audio:'audio/03-that-girl-named-lost.mp3', vibe:'Gas-station heartbreak noir', key:'Dm', characters:'Ryder, Jessie, Lost, Crow', duration:'4:24', note:'A gas-station heartbreak song about a woman named Lost, a man named Crow, and the kind of chemical grace people chase when they have already run out of clean exits.', quote:'Everybody here’s a little lost.' },
  { no:'04', title:'Under Broken Light', audio:'audio/04-under-broken-light.mp3', vibe:'Truck-stop road vision', key:'Am', characters:'Ryder, the girl, Worm', duration:'3:58', note:'A late-night truck-stop track where Ryder meets a wild-eyed girl behind a diner and follows her toward Worm, trailer-row prophecy, and a morning that does not explain anything.', quote:'Some stories start like trouble and don’t stop till daylight.' },
  { no:'05', title:'Walk That Road', audio:'audio/05-walk-that-road.mp3', vibe:'Backroad trap warning', key:'Gm', characters:'Ryder, mountain cook, road pretenders', duration:'3:41', note:'A heavy trap cut about the difference between people who romanticize the outlaw life and people who have actually walked the road, paid the debt, and seen what waits past the tree line.', quote:'The mountain don’t sleep. The mountain knows.' },
  { no:'06', title:'Henry and the Lake of Fire', audio:'audio/06-henry-and-the-lake-of-fire.mp3', vibe:'Hospital storm legend', key:'Dm', characters:'Ryder, Henry, guards, nurses, the storm', duration:'3:47', note:'A true-event county legend told from the waiting-room side: Henry comes into the hospital in orange as a storm rolls over town, reads the fear in the room, and starts screaming Lake of Fire like he finally found his stage.', quote:'Ol’ Henry, he read that room perfectly.' },
  { no:'07', title:'If That Ain’t Slapout', audio:'audio/07-if-that-aint-slapout.mp3', vibe:'Modern poverty country report', key:'Bm', characters:'Ryder, Jessie, Unc, the family in the trailer', duration:'4:41', note:'A hard modern-country report written in the shadow of outlaw tradition. Ryder strips the costume off country and points to the real thing: rent due, hungry kids, rattling pill bottles, unpaid bills, broken shoes, and love that still cannot always keep the wolves away.', quote:'If that ain’t country, then country done lied.' },
  { no:'08', title:'Rooster', audio:'audio/08-rooster.mp3', vibe:'Slapout memory hymn', key:'A', characters:'Ryder, Rooster, Jessie, Unc, Crank', duration:'4:38', note:'A Slapout memory about a man everybody knew as Rooster, his dirty cars, his Bible, his red shop rag, and the kind of mercy people chase when regular life keeps showing its teeth.', quote:'A lap could be a girl dancing off the pole, or time and distance when you’re losing your soul.' },
  { no:'09', title:'Who So Ever Will Church', audio:'audio/09-who-so-ever-will-church.mp3', vibe:'Backroad prison-grief sermon', key:'Dm', characters:'Ryder, Tommy Two-Fang, Jessie, Unc, Tommy’s father', duration:'5:26', note:'A backroad gospel report introducing Tommy Two-Fang, Slapout’s backyard philosopher: a man who gets high, quotes Milton, talks consciousness, and builds a shed church after losing his father to the system. Around Slapout, losing somebody does not always mean they died.', quote:'Some doors stay open cause they need to be.' },
  { no:'10', title:'The Devil’s Mirror: Out of the Mud', audio:'audio/10-the-devils-mirror-out-of-the-mud.mp3', vibe:'Childhood-haunting confession', key:'Em', characters:'Ryder, Jessie, the old rooms, the mirror', duration:'5:02', note:'The album turns inward. Ryder looks back at the rooms that raised him: tin-roof rain, trailer walls, old fear, family damage, smoke, weapons, and ghosts that do not need to be supernatural to keep following a man.', quote:'The rooms I ran from raised me.' },
  { no:'11', title:'Four Flat Tires and a Dented Hood', audio:'audio/11-four-flat-tires-and-a-dented-hood.mp3', vibe:'Origin-world fever report', key:'Gm', characters:'Ryder, Bobby Two-Fangs, Wanda, Slinky Joe, Crystal, Tank', duration:'4:18', note:'The fever-dream track that first opened the Ryder McCoy world: rooster pits, trailer shrines, basement prophets, old violence, busted screens, and sunrise over nothing fixed.', quote:'We’re all just feathers in a hurricane’s prayer.' },
  { no:'12', title:'That Summer', audio:'audio/12-that-summer.mp3', vibe:'Humid outlaw memory', key:'Am', characters:'Ryder, Jessie, Unc, the girl in the truck', duration:'4:29', note:'A sunburnt memory song about two young people chasing freedom down a dirt road, mistaking escape for deliverance, and carrying one Alabama summer like smoke in the blood.', quote:'Old enough to know better, young enough not to care.' },
  { no:'13', title:'Montgomery Days', audio:'audio/13-montgomery-days.mp3', vibe:'Paranoid Gump carnival', key:'Em', characters:'Ryder, Zilla, Sister Sarah, the Crystal Queen, the one-eyed prophet', duration:'4:36', note:'A hypnotic Montgomery spiral where Ryder wakes to Blue Label, follows a sack-chase through Riverwalk prophets, pawnshop visions, Sister Sarah’s den, and the Crystal Queen, only to end up right back where the morning found him.', quote:'Round and round The Gump we go.' },
  { no:'14', title:'Montgomery Mercy', audio:'audio/14-montgomery-mercy.mp3', vibe:'Midnight motel lament', key:'Em', characters:'Ryder, Mercy, Worm, June, Tate, Unc', duration:'4:41', note:'A midnight Montgomery motel song built around Mercy, a woman trying to escape a county spell that keeps renaming her. Ryder moves through room twelve, stairwell prophecy, busted vents, Revelation talk, and sunrise over Bell Street.', quote:'If judgment had an address, it’d rent by the week right here.' },
  { no:'15', title:'The Last Bowl', audio:'audio/15-the-last-bowl.mp3', vibe:'3 a.m. porch gospel closer', key:'Em', characters:'Ryder, Jessie, Unc, daddy’s ghost, the daughter', duration:'4:34', note:'The closing report from the edge of the pipe: one bowl left, rain on tin, daddy’s ghost in the mirror, and a daughter disappearing in the flame. It does not offer rescue. It waits until the glass burns down and shows Ryder who he has really been praying to.', quote:'There will always be a last bowl.' },
];

const LAYERS = [
  { key:'mud', title:'MUD', subtitle:'Place, pressure, and weather', body:'Red clay roads, trailer skirting, gas pumps ticking after midnight, wet boots by the door, and rusted trucks parked under pine trees. Mud is the real place before the symbols start talking.' },
  { key:'blood', title:'BLOOD', subtitle:'People, damage, and survival', body:'Addiction, family wounds, county jail rumors, motel arguments, burned-out deputies, ex-preachers, drifters, and people still laughing while the room falls apart.' },
  { key:'flood', title:'FLOOD', subtitle:'Distortion, prophecy, and consequence', body:'Sleepless nights, drug heat, old sermons, and bad choices speaking the same language. Not clean redemption. Just judgment leaking through ordinary things.' },
];

const PEOPLE = [
  { name:'Ryder McCoy', role:'The Witness', text:'Low voice, sharp eyes, no clean hero angle. Ryder moves through the stories, reports them, and sometimes admits he belongs there too.' },
  { name:'Jessie James Jenkins', role:'The Lament', text:'The cracked gospel-soul voice carrying the choruses. Jessie turns damage into melody without pretending the damage is gone.' },
  { name:'Unc', role:'The Warning Voice', text:'Old road wisdom, bad jokes, and truths nobody asked for. Unc speaks like a man who has seen every version of the same mistake.' },
  { name:'Tommy “Two-Fang”', role:'The Backyard Philosopher', text:'Slapout’s local thinker in the smoke. He quotes Milton, talks consciousness, prison, temptation, and the fall of man like it happened off Lightwood Road.' },
  { name:'Wanda', role:'The Glitter Gatekeeper', text:'Sequins, bad makeup, oil-stained pavement, and temporary escape. Wanda knows glitter saves some nights and cuts people in two on others.' },
];

const ALTERNATES = [
  { title:'Where the Serpent Goes', role:'I-65 truck-stop gospel', note:'A field report from a wet truck stop, an ice machine, an old lottery preacher, and Room Twelve flickering like judgment time.' },
  { title:'Drip Dripping', role:'Motel paranoia countdown', note:'A red-light motel track where a late plug, a dead phone, a cracked mirror, and a dripping sink turn one cheap room into a countdown.' },
  { title:'Through the Glitter', role:'Wanda’s backroad escape hymn', note:'A County 11 track about red sequins, oil-stained pavement, and the glitter people walk through when the plain truth hurts too much.' },
  { title:'Jenny in the Porch Light', role:'Slapout memory fracture', note:'A humid single-wide memory built around Jenny, a bug zapper, a silver chain, and a night Ryder cannot fully put back together.' },
  { title:'Slap Out Rules', role:'Running-on-fumes backroad gospel', note:'A Slapout double-meaning track about being out of gas, out of cash, out of sleep, and still chasing one more answer from the road.' },
  { title:'First It Gives You Wings', role:'Meth-life anatomy warning', note:'A cold explanation of how the first high becomes a sky that never comes back.' },
];

const RECKONINGS = [
  'We’re not entertainers. We’re reporters from the brink.',
  'If you do not know the people in these songs, you know people like them.',
  'Around Slapout, losing somebody does not always mean they died.',
  'Some folks don’t get high to see heaven. They get high because regular earth keeps showing its teeth.',
  'There will always be a last bowl.',
];

function App() {
  const [menuOpen, setMenuOpen] = useState(false);
  const [reckoning, setReckoning] = useState(RECKONINGS[0]);
  const [nowPlaying, setNowPlaying] = useState(TRACKS[0]);

  useEffect(() => {
    const id = setInterval(() => {
      setReckoning(prev => RECKONINGS[(RECKONINGS.indexOf(prev) + 1) % RECKONINGS.length]);
    }, 5000);
    return () => clearInterval(id);
  }, []);

  const scrollTo = (id) => {
    setMenuOpen(false);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div className="min-h-screen bg-swamp text-altar font-type antialiased relative overflow-x-hidden">
      <nav className="sticky top-0 z-50 bg-swamp/85 backdrop-blur border-b border-clay/40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
          <button onClick={() => scrollTo('hero')} className="flex items-center gap-3 group">
            <span className="w-9 h-9 rounded-full bg-sinner flex items-center justify-center font-blackletter text-xl text-altar shadow-glow">R</span>
            <span className="font-blackletter text-xl sm:text-2xl tracking-wider text-altar group-hover:text-sinner transition-colors">Ryder McCoy</span>
          </button>
          <ul className="hidden md:flex items-center gap-8 text-sm uppercase tracking-[0.2em]">
            {NAV.map(n => <li key={n.id}><button onClick={() => scrollTo(n.id)} className="hover:text-sinner transition-colors border-b border-transparent hover:border-sinner pb-1">{n.label}</button></li>)}
          </ul>
          <button onClick={() => setMenuOpen(!menuOpen)} className="md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5" aria-label="Menu">
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? 'opacity-0' : ''}`}></span>
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
          </button>
        </div>
        {menuOpen && <div className="md:hidden border-t border-clay/40 bg-swamp"><ul className="px-6 py-4 space-y-4 text-sm uppercase tracking-[0.2em]">{NAV.map(n => <li key={n.id}><button onClick={() => scrollTo(n.id)} className="block w-full text-left hover:text-sinner">{n.label}</button></li>)}</ul></div>}
      </nav>

      <section id="hero" className="relative grain vignette min-h-[92vh] flex items-end overflow-hidden">
        <img src="assets/hero-band.jpg" alt="Ryder McCoy band on stage" className="absolute inset-0 w-full h-full object-cover opacity-70" />
        <div className="absolute inset-0 bg-gradient-to-t from-swamp via-swamp/50 to-transparent"></div>
        <div className="relative max-w-7xl mx-auto px-6 sm:px-8 lg:px-10 pb-20 pt-32 w-full">
          <p className="uppercase tracking-[0.4em] text-clay text-xs sm:text-sm mb-4">◆ {BRAND.sub} ◆</p>
          <h1 className="font-blackletter text-6xl sm:text-8xl lg:text-9xl leading-[0.95] text-altar drop-shadow-[0_0_30px_rgba(107,17,17,0.5)]">Ryder<br/>McCoy</h1>
          <p className="mt-6 max-w-2xl text-base sm:text-lg text-altar/85 leading-relaxed">
            {BRAND.tagline} A Southern Gothic trap record from Alabama backroads, motel rooms, truck stops, trailer parks, river bridges, and people standing too close to the edge. {BRAND.location}
          </p>
          <div className="mt-10 flex flex-col sm:flex-row gap-4">
            <button onClick={() => scrollTo('player')} className="px-7 py-3 bg-sinner text-altar font-type uppercase tracking-[0.2em] text-sm rounded shadow-glow hover:bg-altar hover:text-sinner transition-all">▶ Play THE WARNING</button>
            <button onClick={() => scrollTo('story')} className="px-7 py-3 border border-clay text-altar uppercase tracking-[0.2em] text-sm rounded hover:border-altar transition-all">Read the Story</button>
          </div>
          <div className="mt-14 border-t border-clay/40 pt-4 text-clay text-xs uppercase tracking-[0.3em]"><span className="inline-block w-2 h-2 bg-sinner rounded-full mr-2 pulse-slow align-middle"></span>Biloxi Blues transmission — {reckoning}</div>
        </div>
      </section>

      <section id="story" className="relative py-24 sm:py-32">
        <div className="max-w-5xl mx-auto px-6 sm:px-8">
          <SectionLabel num="01" title="The Story" />
          <div className="mt-10 grid md:grid-cols-5 gap-10 items-start">
            <div className="md:col-span-2"><div className="aspect-[3/4] rounded-lg overflow-hidden border border-clay/40 shadow-soft relative grain"><img src="https://image.qwenlm.ai/public_source/134da842-7df6-448d-8417-c95c0e16e5fa/1d99b6500-5fe6-4e36-b294-b29896088f83.png" alt="Ryder portrait" className="w-full h-full object-cover opacity-85" /><div className="absolute bottom-3 left-3 text-xs uppercase tracking-[0.25em] text-altar bg-swamp/70 px-2 py-1 rounded">File No. 11 — R.M.</div></div></div>
            <div className="md:col-span-3 space-y-5 text-altar/85 leading-loose">
              <p><span className="text-sinner font-bold">FIELD REPORT:</span> Ryder McCoy came out of the dark stretch between Slapout and Montgomery with songs that sounded less like entertainment and more like evidence.</p>
              <p>Some say it is a band. Some say it is one man with witnesses. Some say it is just what happens when the same stories keep showing up at every gas station after midnight.</p>
              <p>Ryder gives the verses low and measured. Jessie carries the hooks like a church voice with smoke in it. Unc comes through as the old survivor, laughing at the wrong time because he has seen too much.</p>
              <p className="border-l-2 border-sinner pl-4 italic text-altar">“If you do not know the people in these songs, you know people like them.”</p>
            </div>
          </div>
        </div>
      </section>

      <section className="relative py-24 sm:py-32 bg-gradient-to-b from-swamp to-swamp/80 border-y border-clay/30">
        <div className="max-w-7xl mx-auto px-6 sm:px-8">
          <SectionLabel num="02" title="The Three Layers" subtitle="Mud, Blood, Flood — the Ryder McCoy world map" />
          <div className="mt-12 grid md:grid-cols-3 gap-6 lg:gap-8">
            {LAYERS.map(layer => <article key={layer.key} className="rounded-xl border border-clay/40 bg-swamp shadow-soft hover:shadow-glow transition-all duration-500 p-6"><p className="text-clay text-xs uppercase tracking-[0.3em]">Layer / {layer.key}</p><h3 className="font-blackletter text-5xl text-altar mt-2">{layer.title}</h3><p className="mt-1 text-clay text-xs uppercase tracking-[0.3em]">{layer.subtitle}</p><p className="mt-4 text-altar/80 leading-relaxed text-sm">{layer.body}</p></article>)}
          </div>
        </div>
      </section>

      <section className="relative py-24 sm:py-32 border-b border-clay/30">
        <div className="max-w-7xl mx-auto px-6 sm:px-8">
          <SectionLabel num="03" title="People in the Songs" subtitle="Recurring voices, county names, and half-remembered warnings" />
          <div className="mt-10 grid md:grid-cols-2 lg:grid-cols-5 gap-5">
            {PEOPLE.map(p => <article key={p.name} className="rounded-xl border border-clay/40 bg-swamp p-5 shadow-soft hover:border-sinner transition-all"><p className="text-clay text-xs uppercase tracking-[0.25em]">{p.role}</p><h3 className="font-blackletter text-3xl text-altar mt-2">{p.name}</h3><p className="mt-3 text-altar/80 text-sm leading-relaxed">{p.text}</p></article>)}
          </div>
        </div>
      </section>

      <section id="catalog" className="relative py-24 sm:py-32">
        <div className="max-w-7xl mx-auto px-6 sm:px-8">
          <SectionLabel num="04" title="The Warning" subtitle="Biloxi Blues Records — 15-track working album" />
          <div className="mt-10 rounded-2xl border border-sinner/50 bg-swamp/70 shadow-glow p-6 sm:p-8 relative grain overflow-hidden">
            <div className="text-clay text-xs uppercase tracking-[0.3em]">Biloxi Blues Records presents</div>
            <h3 className="font-blackletter text-5xl sm:text-7xl text-altar mt-3">THE WARNING</h3>
            <p className="mt-4 max-w-3xl text-altar/85 leading-loose">Fifteen field reports from the edge of rural Alabama, cut from storm noise, gospel damage, backroad trap drums, motel light, county jail language, porch talk, and people standing close enough to the fire to describe the heat.</p>
            <p className="mt-4 text-sinner italic text-lg">We’re not entertainers. We’re reporters from the brink.</p>
          </div>

          <div className="mt-10 rounded-xl border border-clay/40 overflow-hidden shadow-soft">
            <div className="hidden md:grid grid-cols-12 gap-4 bg-sinner/20 border-b border-clay/40 px-6 py-3 text-xs uppercase tracking-[0.25em] text-clay"><div className="col-span-1">#</div><div className="col-span-3">Title</div><div className="col-span-3">Vibe</div><div className="col-span-3">Key Characters</div><div className="col-span-1">Key</div><div className="col-span-1 text-right">Len</div></div>
            <div className="divide-y divide-clay/20">
              {TRACKS.map(t => <button key={t.no} onClick={() => {setNowPlaying(t); setTimeout(() => scrollTo('player'), 50)}} className={`w-full grid grid-cols-12 gap-2 md:gap-4 px-4 md:px-6 py-4 text-left hover:bg-sinner/10 transition-colors items-center ${nowPlaying.no===t.no ? 'bg-sinner/15' : ''}`}><div className="col-span-2 md:col-span-1 text-clay text-sm">{t.no}</div><div className="col-span-10 md:col-span-3"><div className="text-altar font-bold tracking-wide">{t.title}</div><div className="md:hidden text-xs text-clay mt-1">{t.vibe}</div></div><div className="hidden md:block col-span-3 text-altar/75 text-sm">{t.vibe}</div><div className="hidden md:block col-span-3 text-altar/75 text-sm italic">{t.characters}</div><div className="hidden md:block col-span-1 text-clay text-sm font-mono">{t.key}</div><div className="hidden md:block col-span-1 text-right text-clay text-sm font-mono">{t.duration}</div><div className="col-span-12 md:hidden flex items-center justify-between text-xs text-clay pt-2 border-t border-clay/20 mt-2"><span className="italic">{t.characters}</span><span className="font-mono">{t.key} · {t.duration}</span></div></button>)}
            </div>
          </div>
        </div>
      </section>

      <section id="player" className="relative py-24 sm:py-32 border-y border-clay/30 bg-gradient-to-b from-swamp to-black/20">
        <div className="max-w-5xl mx-auto px-6 sm:px-8">
          <SectionLabel num="05" title="Album Player" subtitle="Drop MP3s into /audio using the filenames shown in the code" />
          <div className="mt-10 rounded-2xl border border-clay/40 bg-swamp shadow-glow p-6 sm:p-8">
            <div className="flex items-start gap-4">
              <div className="w-16 h-16 rounded bg-sinner flex items-center justify-center text-altar text-3xl font-blackletter shadow-glow shrink-0">♪</div>
              <div className="flex-1 min-w-0">
                <div className="text-xs uppercase tracking-[0.3em] text-clay">Now Spinning</div>
                <h3 className="font-blackletter text-4xl sm:text-5xl text-altar mt-1">{nowPlaying.no}. {nowPlaying.title}</h3>
                <p className="text-clay text-sm mt-1">{nowPlaying.vibe} · {nowPlaying.characters}</p>
                <p className="mt-4 text-altar/80 leading-relaxed">{nowPlaying.note}</p>
                <p className="mt-3 text-sinner italic">“{nowPlaying.quote}”</p>
                <audio key={nowPlaying.audio} controls preload="metadata" className="w-full mt-6" src={nowPlaying.audio}>
                  Your browser does not support the audio element.
                </audio>
                <p className="mt-3 text-xs text-clay leading-relaxed">Expected file path: <span className="text-altar">{nowPlaying.audio}</span></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="field-reports" className="relative py-24 sm:py-32 border-y border-clay/30">
        <div className="max-w-7xl mx-auto px-6 sm:px-8">
          <SectionLabel num="06" title="Other Field Reports" subtitle="Songs still moving through the county rumor mill" />
          <div className="mt-10 grid md:grid-cols-2 lg:grid-cols-3 gap-5">
            {ALTERNATES.map(a => <article key={a.title} className="rounded-xl border border-clay/40 bg-swamp p-5 shadow-soft hover:border-sinner transition-all"><p className="text-clay text-xs uppercase tracking-[0.25em]">{a.role}</p><h3 className="font-blackletter text-4xl text-altar mt-2">{a.title}</h3><p className="mt-3 text-altar/80 text-sm leading-relaxed">{a.note}</p></article>)}
          </div>
        </div>
      </section>

      <footer className="border-t border-clay/40 py-10 text-center text-clay text-xs uppercase tracking-[0.3em]">
        <div className="font-blackletter text-2xl text-altar mb-3">Ryder McCoy</div>
        <p>© {new Date().getFullYear()} — Biloxi Blues Records · Alabama Field Recordings</p>
        <p className="mt-2 text-clay/70">No clean endings. No fake saints. No curtain call.</p>
        <p className="mt-5 normal-case tracking-[0.16em] text-clay/60">
          Developed by <a href="https://lsgsalesjobs.com/" target="_blank" rel="noopener noreferrer" className="text-altar/80 underline underline-offset-4 hover:text-sinner transition-colors">LSG Artist Homes</a>
        </p>
      </footer>
    </div>
  );
}

function SectionLabel({ num, title, subtitle, center=false }) {
  return <div className={`${center ? 'text-center' : ''}`}><div className="flex items-center gap-4 justify-center md:justify-start" style={{justifyContent: center ? 'center' : 'flex-start'}}><span className="text-sinner font-mono text-sm">/ {num}</span><span className="h-px flex-1 max-w-[40px] bg-clay"></span><span className="text-clay text-xs uppercase tracking-[0.3em]">Chapter</span></div><h2 className={`font-blackletter text-5xl sm:text-6xl lg:text-7xl text-altar mt-3 ${center ? 'text-center' : ''}`}>{title}</h2>{subtitle && <p className={`mt-3 text-clay text-sm uppercase tracking-[0.25em] ${center ? 'text-center' : ''}`}>{subtitle}</p>}</div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
