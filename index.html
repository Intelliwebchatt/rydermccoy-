<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Warning — The Ryder McCoy Band | Free Album</title>
<meta name="description" content="The Warning is a free album from The Ryder McCoy Band: Southern Gothic trap, outlaw country, swamp blues, and Alabama field-report storytelling." />

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/pirata-one@latest/normal-400.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/special-elite@latest/normal-400.css" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          swamp: '#0D110E',
          altar: '#EAE5DA',
          sinner: '#8F1717',
          blood: '#B91C1C',
          clay: '#A39181',
          ember: '#F4B06A',
          night: '#050605',
        },
        fontFamily: {
          blackletter: ['"Pirata One"', 'serif'],
          type: ['"Special Elite"', '"Courier New"', 'monospace'],
        },
        boxShadow: {
          glow: '0 0 24px rgba(185,28,28,0.35), 0 0 60px rgba(13,17,14,0.8)',
          ember: '0 0 18px rgba(244,176,106,0.28)',
          soft: '0 4px 30px rgba(0,0,0,0.6)',
        }
      }
    }
  }
</script>

<style>
  html { scroll-behavior: smooth; background:#0D110E; }
  html, body { background:#0D110E; color:#EAE5DA; }
  body { font-family: 'Special Elite','Courier New',monospace; }
  .grain::before {
    content:"";
    position:absolute; inset:0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92  0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
    pointer-events:none;
    opacity:.30;
  }
  .vignette::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.86) 100%);
  }
  @keyframes pulse-slow { 0%,100%{opacity:.4} 50%{opacity:1} }
  .pulse-slow{ animation: pulse-slow 3s ease-in-out infinite; }
  .track-row:focus-visible, button:focus-visible, a:focus-visible {
    outline: 2px solid #F4B06A;
    outline-offset: 3px;
  }
  audio { filter: sepia(25%) saturate(70%) contrast(110%); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const BRAND = {
  name: 'The Ryder McCoy Band',
  album: 'The Warning',
  tagline: 'Outlaw country, swamp blues, and slow-rolling Southern trap. Backroad songs written like they happened. Because some of them did.',
  sub: 'Slapout, Alabama · Biloxi Blues Records',
  location: 'Slapout, Montgomery, Wetumpka, Deatsville — recorded where the porch lights hum and the road runs out.',
};

const NAV = [
  { id: 'catalog', label: 'Listen' },
  { id: 'story', label: 'Story' },
  { id: 'band', label: 'Band' },
  { id: 'contact', label: 'Contact' },
];

const TRACKS = [
  { no:'01', title:'The Warning', audio:'audio/01-the-warning.mp3', vibe:'Apocalyptic backroad opener', key:'Em', characters:'Ryder, Unc, the Beast', duration:'4:31', note:'A storm-lit opener where Ryder crawls through a drug vision, a dirt-road apocalypse, and the kind of judgment that may be coming from God, the glass, or his own burned-out nervous system.', quote:'This ain’t a story… it’s a warning.' },
  { no:'02', title:'Out of That Life', audio:'audio/02-out-of-that-life.mp3', vibe:'Montgomery escape hymn', key:'Am', characters:'Ryder, Jessie, Unc, Crank, Worm', duration:'4:12', note:'A storm-lit Montgomery track about wanting out while the old life keeps speaking through glass pipes, trailer-park paranoia, empty syringes, and motel-sign prophecy.', quote:'The Gospel’s an echo in the empty syringe.' },
  { no:'03', title:'That Girl Named Lost', audio:'audio/03-that-girl-named-lost.mp3', vibe:'Gas-station heartbreak noir', key:'Dm', characters:'Ryder, Jessie, Lost, Crow', duration:'4:24', note:'A gas-station heartbreak song about a woman named Lost, a man named Crow, and the kind of chemical grace people chase when they have already run out of clean exits.', quote:'Everybody here’s a little lost.' },
  { no:'04', title:'Under Broken Light', audio:'audio/04-under-broken-light.mp3', vibe:'Truck-stop road vision', key:'Am', characters:'Ryder, the girl, Worm', duration:'3:58', note:'A late-night truck-stop track where Ryder meets a wild-eyed girl behind a diner and follows her toward Worm, trailer-row prophecy, and a morning that does not explain anything.', quote:'Some stories start like trouble and don’t stop till daylight.' },
  { no:'05', title:'Walk That Road', audio:'audio/05-walk-that-road.mp3', vibe:'Backroad trap warning', key:'Gm', characters:'Ryder, mountain cook, road pretenders', duration:'3:41', note:'A heavy trap cut about the difference between people who romanticize the outlaw life and people who have actually walked the road, paid the debt, and seen what waits past the tree line.', quote:'The mountain don’t sleep. The mountain knows.' },
  { no:'06', title:'Henry and the Lake of Fire', audio:'audio/06-henry-and-the-lake-of-fire.mp3', vibe:'Hospital storm legend', key:'Dm', characters:'Ryder, Henry, guards, nurses, the storm', duration:'3:47', note:'A true-event county legend told from the waiting-room side: Henry comes into the hospital in orange as a storm rolls over town, reads the fear in the room, and starts screaming Lake of Fire like he finally found his stage.', quote:'Ol’ Henry, he read that room perfectly.' },
  { no:'07', title:'If That Ain’t Slapout', audio:'audio/07-if-that-aint-slapout.mp3', vibe:'Modern poverty country report', key:'Bm', characters:'Ryder, Jessie, Unc, the family in the trailer', duration:'4:41', note:'A hard modern-country report written in the shadow of outlaw tradition. Ryder strips the costume off country and points to the real thing: rent due, hungry kids, rattling pill bottles, unpaid bills, broken shoes, and love that still cannot always keep the wolves away.', quote:'If that ain’t country, then country done lied.' },
  { no:'08', title:'Rooster', audio:'audio/08-rooster.mp3', vibe:'Slapout memory hymn', key:'A', characters:'Ryder, Rooster, Jessie, Unc, Crank', duration:'4:38', note:'A Slapout memory about a man everybody knew as Rooster, his dirty cars, his Bible, his red shop rag, and the kind of mercy people chase when regular life keeps showing its teeth.', quote:'A lap could be a girl dancing off the pole, or time and distance when you’re losing your soul.' },
  { no:'09', title:'Who So Ever Will Church', audio:'audio/09-who-so-ever-will-church.mp3', vibe:'Backroad prison-grief sermon', key:'Dm', characters:'Ryder, Tommy Two-Fang, Jessie, Unc, Tommy’s father', duration:'5:26', note:'A backroad gospel report introducing Tommy Two-Fang, Slapout’s backyard philosopher: a man who gets high, quotes Milton, talks consciousness, and builds a shed church after losing his father to the system. Around Slapout, losing somebody does not always mean they died.', quote:'Some doors stay open cause they need to be.' },
  { no:'10', title:'The Devil’s Mirror: Out of the Mud', audio:'audio/10-the-devils-mirror-out-of-the-mud.mp3', vibe:'Childhood-haunting confession', key:'Em', characters:'Ryder, Jessie, the old rooms, the mirror', duration:'5:02', note:'The album turns inward. Ryder looks back at the rooms that raised him: tin-roof rain, trailer walls, old fear, family damage, smoke, weapons, and ghosts that do not need to be supernatural to keep following a man.', quote:'The rooms I ran from raised me.' },
  { no:'11', title:'Four Flat Tires and a Dented Hood', audio:'audio/11-four-flat-tires-and-a-dented-hood.mp3', vibe:'Origin-world fever report', key:'Gm', characters:'Ryder, Bobby Two-Fangs, Wanda, Slinky Joe, Crystal, Tank', duration:'4:18', note:'The fever-dream track that first opened the Ryder McCoy world: rooster pits, trailer shrines, basement prophets, old violence, busted screens, and sunrise over nothing fixed.', quote:'We’re all just feathers in a hurricane’s prayer.' },
  { no:'12', title:'That Summer', audio:'audio/12-that-summer.mp3', vibe:'Humid outlaw memory', key:'Am', characters:'Ryder, Jessie, Unc, the girl in the truck', duration:'4:29', note:'A sunburnt memory song about two young people chasing freedom down a dirt road, mistaking escape for deliverance, and carrying one Alabama summer like smoke in the blood.', quote:'Old enough to know better, young enough not to care.' },
  { no:'13', title:'Montgomery Days', audio:'audio/13-montgomery-days.mp3', vibe:'Paranoid Gump carnival', key:'Em', characters:'Ryder, Zilla, Sister Sarah, the Crystal Queen, the one-eyed prophet', duration:'4:36', note:'A hypnotic Montgomery spiral where Ryder wakes to Blue Label, follows a sack-chase through Riverwalk prophets, pawnshop visions, Sister Sarah’s den, and the Crystal Queen, only to end up right back where the morning found him.', quote:'Round and round The Gump we go.' },
  { no:'14', title:'Montgomery Mercy', audio:'audio/14-montgomery-mercy.mp3', vibe:'Midnight motel lament', key:'Em', characters:'Ryder, Mercy, Worm, June, Tate, Unc', duration:'4:41', note:'A midnight Montgomery motel song built around Mercy, a woman trying to escape a county spell that keeps renaming her. Ryder moves through room twelve, stairwell prophecy, busted vents, Revelation talk, and sunrise over Bell Street.', quote:'If judgment had an address, it’d rent by the week right here.' },
  { no:'15', title:'The Last Bowl', audio:'audio/15-the-last-bowl.mp3', vibe:'3 a.m. porch gospel closer', key:'Em', characters:'Ryder, Jessie, Unc, daddy’s ghost, the daughter', duration:'4:34', note:'The closing report from the edge of the pipe: one bowl left, rain on tin, daddy’s ghost in the mirror, and a daughter disappearing in the flame. It does not offer rescue. It waits until the glass burns down and shows Ryder who he has really been praying to.', quote:'There will always be a last bowl.' },
];

const PEOPLE = [
  { name:'Ryder McCoy', role:'Vocals · Guitar · Songwriter', text:"Came from the mud, left long enough to see the pattern, came back because it's still home. He does not preach. He reports." },
  { name:'Jessie James Jenkins', role:'Vocals', text:"The blade in the middle of the noise. She sings the part Ryder will not say out loud, and the room gets smaller every time." },
  { name:'Unc', role:"Vocals · Whatever's handy", text:"Says things that sound crazy until the night proves him close enough. Do not ask. He has already told you." },
];

const RECKONINGS = [
  'We’re not entertainers. We’re reporters from the brink.',
  'If you do not know the people in these songs, you know people like them.',
  'Around Slapout, losing somebody does not always mean they died.',
  'Some folks don’t get high to see heaven. They get high because regular earth keeps showing its teeth.',
  'There will always be a last bowl.',
];

function App() {
  const [menuOpen, setMenuOpen] = useState(false);
  const [reckoning, setReckoning] = useState(RECKONINGS[0]);
  const [nowPlaying, setNowPlaying] = useState(TRACKS[0]);
  const [isPlaying, setIsPlaying] = useState(false);
  const [autoPlay, setAutoPlay] = useState(false);
  const [playerOpen, setPlayerOpen] = useState(false);
  const audioRef = useRef(null);

  useEffect(() => {
    const id = setInterval(() => {
      setReckoning(prev => RECKONINGS[(RECKONINGS.indexOf(prev) + 1) % RECKONINGS.length]);
    }, 5000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;

    audio.load();

    if (autoPlay) {
      const playPromise = audio.play();
      if (playPromise && playPromise.then) {
        playPromise
          .then(() => setIsPlaying(true))
          .catch(() => setIsPlaying(false));
      } else {
        setIsPlaying(true);
      }
    }
  }, [nowPlaying]);

  const scrollTo = (id) => {
    setMenuOpen(false);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const trackIndex = TRACKS.findIndex(t => t.no === nowPlaying.no);

  const playTrack = (track) => {
    setPlayerOpen(true);
    setAutoPlay(true);

    if (track.no === nowPlaying.no) {
      const audio = audioRef.current;
      if (audio) {
        audio.play()
          .then(() => setIsPlaying(true))
          .catch(() => setIsPlaying(false));
      }
      return;
    }

    setNowPlaying(track);
  };

  const playFullAlbum = () => {
    setPlayerOpen(true);
    setAutoPlay(true);
    setNowPlaying(TRACKS[0]);

    setTimeout(() => {
      const audio = audioRef.current;
      if (audio) {
        audio.play()
          .then(() => setIsPlaying(true))
          .catch(() => setIsPlaying(false));
      }
    }, 50);
  };

  const togglePlayback = () => {
    setPlayerOpen(true);
    const audio = audioRef.current;
    if (!audio) return;

    if (audio.paused) {
      setAutoPlay(true);
      audio.play()
        .then(() => setIsPlaying(true))
        .catch(() => setIsPlaying(false));
    } else {
      audio.pause();
      setIsPlaying(false);
    }
  };

  const playNext = () => {
    const next = TRACKS[trackIndex + 1];
    if (next) {
      setAutoPlay(true);
      setNowPlaying(next);
    } else {
      setIsPlaying(false);
      setAutoPlay(false);
    }
  };

  const playPrevious = () => {
    const previous = TRACKS[trackIndex - 1] || TRACKS[0];
    setAutoPlay(true);
    setNowPlaying(previous);
  };

  return (
    <div className="min-h-screen bg-swamp text-altar font-type antialiased relative overflow-x-hidden pb-32">
      <audio
        ref={audioRef}
        src={nowPlaying.audio}
        preload="metadata"
        onPlay={() => setIsPlaying(true)}
        onPause={() => setIsPlaying(false)}
        onEnded={playNext}
      />

      <nav className="sticky top-0 z-50 bg-night/90 backdrop-blur border-b border-clay/30">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
          <button onClick={() => scrollTo('hero')} className="flex items-center gap-3 group">
            <span className="w-9 h-9 rounded-full bg-sinner flex items-center justify-center font-blackletter text-xl text-altar shadow-glow">R</span>
            <span className="font-blackletter text-xl sm:text-2xl tracking-wider text-altar group-hover:text-ember transition-colors">Ryder McCoy</span>
          </button>
          <ul className="hidden md:flex items-center gap-8 text-sm uppercase tracking-[0.2em]">
            {NAV.map(n => <li key={n.id}><button onClick={() => scrollTo(n.id)} className="hover:text-ember transition-colors border-b border-transparent hover:border-ember pb-1">{n.label}</button></li>)}
          </ul>
          <button onClick={() => setMenuOpen(!menuOpen)} className="md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5" aria-label="Menu">
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? 'opacity-0' : ''}`}></span>
            <span className={`w-6 h-0.5 bg-altar transition ${menuOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
          </button>
        </div>
        {menuOpen && <div className="md:hidden border-t border-clay/40 bg-night"><ul className="px-6 py-4 space-y-4 text-sm uppercase tracking-[0.2em]">{NAV.map(n => <li key={n.id}><button onClick={() => scrollTo(n.id)} className="block w-full text-left hover:text-ember">{n.label}</button></li>)}</ul></div>}
      </nav>

      <section id="hero" className="relative grain vignette min-h-[82vh] sm:min-h-[88vh] flex items-end overflow-hidden">
        <img src="assets/hero-band.jpg" alt="The Ryder McCoy Band" className="absolute inset-0 w-full h-full object-cover opacity-72" />
        <div className="absolute inset-0 bg-gradient-to-t from-swamp via-swamp/55 to-black/15"></div>
        <div className="relative max-w-7xl mx-auto px-6 sm:px-8 lg:px-10 pb-12 sm:pb-20 pt-28 w-full">
          <p className="uppercase tracking-[0.35em] text-ember text-xs sm:text-sm mb-3">{BRAND.sub}</p>
          <h1 className="font-blackletter text-6xl sm:text-8xl lg:text-9xl leading-[0.9] text-altar drop-shadow-[0_0_30px_rgba(185,28,28,0.5)]">THE<br/>WARNING</h1>
          <p className="mt-3 text-ember uppercase tracking-[0.28em] text-xs sm:text-sm">A free album from The Ryder McCoy Band</p>
          <p className="mt-6 max-w-2xl text-base sm:text-lg text-altar/88 leading-relaxed">{BRAND.tagline}</p>
          <div className="mt-8 flex flex-col sm:flex-row gap-4">
            <button onClick={playFullAlbum} className="px-7 py-4 bg-blood text-altar font-type uppercase tracking-[0.18em] text-sm rounded shadow-glow hover:bg-altar hover:text-sinner transition-all">▶ Play Full Album</button>
            <button onClick={() => scrollTo('catalog')} className="px-7 py-4 border border-ember/70 text-altar uppercase tracking-[0.18em] text-sm rounded hover:border-altar hover:text-ember transition-all">Tracklist</button>
            <button onClick={() => scrollTo('catalog')} className="px-7 py-4 border border-clay/70 text-altar uppercase tracking-[0.18em] text-sm rounded hover:border-altar hover:text-ember transition-all">Download Tracks</button>
          </div>
          <div className="mt-10 border-t border-clay/40 pt-4 text-clay text-xs uppercase tracking-[0.25em] leading-relaxed">
            <span className="inline-block w-2 h-2 bg-blood rounded-full mr-2 pulse-slow align-middle"></span>
            Biloxi Blues transmission — {reckoning}
          </div>
        </div>
      </section>

      <section id="catalog" className="relative py-16 sm:py-24">
        <div className="max-w-6xl mx-auto px-5 sm:px-8">
          <SectionLabel eyebrow="The Album" title="THE WARNING" />
          <div className="mt-7 grid lg:grid-cols-[1fr_360px] gap-6 lg:gap-8 items-start">
            <div>
              <p className="text-altar/85 leading-loose text-lg">
                {TRACKS.length} tracks. Stream any song free. Tap the arrow beside a song to download that track. No email, no signup, no catch.
              </p>

              <div className="mt-7 flex flex-col sm:flex-row gap-3">
                <button onClick={playFullAlbum} className="px-6 py-4 bg-blood text-altar uppercase tracking-[0.18em] text-sm rounded shadow-glow hover:bg-altar hover:text-sinner transition-all">▶ Play Full Album</button>
                <button onClick={() => scrollTo('catalog')} className="px-6 py-4 border border-ember/70 text-altar uppercase tracking-[0.18em] text-sm rounded hover:border-altar transition-all text-center">Download Tracks Below</button>
              </div>

              <div className="mt-8 rounded-xl border border-clay/35 overflow-hidden shadow-soft bg-[#15110f]">
                <div className="grid grid-cols-[2.25rem_1fr_4.5rem_3rem_3rem] sm:grid-cols-[3rem_1fr_5rem_3.5rem_3.5rem] gap-2 bg-sinner/20 border-b border-clay/35 px-4 sm:px-6 py-4 text-xs uppercase tracking-[0.20em] text-clay items-center">
                  <div>#</div>
                  <div>Title</div>
                  <div className="text-right">Len</div>
                  <div className="text-center">Play</div>
                  <div className="text-center">Get</div>
                </div>

                <div className="divide-y divide-clay/20">
                  {TRACKS.map(t => (
                    <div key={t.no} className={`track-row grid grid-cols-[2.25rem_1fr_4.5rem_3rem_3rem] sm:grid-cols-[3rem_1fr_5rem_3.5rem_3.5rem] gap-2 px-4 sm:px-6 py-4 items-center transition-colors ${nowPlaying.no===t.no ? 'bg-sinner/18' : 'hover:bg-sinner/10'}`}>
                      <button onClick={() => playTrack(t)} className="text-left text-clay text-sm">{t.no}</button>
                      <button onClick={() => playTrack(t)} className="text-left min-w-0">
                        <span className="block text-altar font-bold tracking-wide text-base sm:text-lg whitespace-normal break-words leading-snug">{t.title}</span>
                        <span className="block text-xs text-clay mt-1 whitespace-normal break-words">{t.vibe}</span>
                      </button>
                      <div className="text-right text-clay text-sm font-mono">{t.duration}</div>
                      <button onClick={() => playTrack(t)} aria-label={`Play ${t.title}`} className="h-11 w-11 border border-clay/35 rounded flex items-center justify-center hover:border-ember hover:text-ember transition-colors">{nowPlaying.no === t.no && isPlaying ? '❚❚' : '▶'}</button>
                      <a onClick={(e) => e.stopPropagation()} href={t.audio} download aria-label={`Download ${t.title}`} className="h-11 w-11 border border-clay/35 rounded flex items-center justify-center hover:border-ember hover:text-ember transition-colors">⇩</a>
                    </div>
                  ))}
                </div>
              </div>

              <div className="mt-7 text-center">
                <p className="mt-4 text-clay text-sm tracking-[0.15em]">Each track downloads free · MP3 · no email · no signup · no catch</p>
              </div>
            </div>

            <aside className="rounded-2xl border border-clay/35 bg-swamp shadow-glow p-5 sm:p-6 sticky top-24">
              <div className="text-xs uppercase tracking-[0.28em] text-ember">Now Playing</div>
              <h3 className="font-blackletter text-4xl text-altar mt-2 leading-none">{nowPlaying.no}. {nowPlaying.title}</h3>
              <p className="text-clay text-sm mt-2">{nowPlaying.vibe}</p>
              <p className="mt-4 text-altar/78 leading-relaxed text-sm">{nowPlaying.note}</p>
              <p className="mt-4 text-ember italic text-sm">“{nowPlaying.quote}”</p>
              <div className="mt-5 flex items-center gap-3">
                <button onClick={playPrevious} className="h-11 w-11 border border-clay/40 rounded hover:border-ember hover:text-ember transition-colors">⏮</button>
                <button onClick={togglePlayback} className="h-12 flex-1 bg-blood rounded uppercase tracking-[0.16em] text-sm shadow-glow hover:bg-altar hover:text-sinner transition-all">{isPlaying ? 'Pause' : 'Play'}</button>
                <button onClick={playNext} className="h-11 w-11 border border-clay/40 rounded hover:border-ember hover:text-ember transition-colors">⏭</button>
              </div>
              <a href={nowPlaying.audio} download className="mt-4 block text-center px-5 py-3 border border-clay/40 rounded uppercase tracking-[0.16em] text-xs hover:border-ember hover:text-ember transition-colors">Download This Track</a>
            </aside>
          </div>
        </div>
      </section>

      <section id="story" className="relative py-16 sm:py-24 border-y border-clay/25 bg-gradient-to-b from-swamp to-black/20">
        <div className="max-w-5xl mx-auto px-5 sm:px-8">
          <SectionLabel eyebrow="The Story" title="OUT OF SLAPOUT" />
          <div className="mt-8 space-y-6 text-altar/82 leading-loose text-lg">
            <p>The Ryder McCoy Band comes out of Slapout, Alabama — the stretch of red dirt and river road between Holtville and Montgomery. The sound sits somewhere between outlaw country, swamp blues, Southern rock, and slow-rolling trap.</p>
            <p>The songs come from real-feeling places: Waffle House booths, boat ramps, county roads, motel parking lots, and nights that did not go the way anybody planned.</p>
            <p>Ryder writes them like he saw them. <em>The Warning</em> is the first full record, cut for Biloxi Blues Records and given away free because the people these songs are about should not have to pay to hear them.</p>
          </div>
          <div className="mt-10 rounded-xl overflow-hidden border border-clay/35 shadow-soft grain relative">
            <img src="https://image.qwenlm.ai/public_source/134da842-7df6-448d-8417-c95c0e16e5fa/1d99b6500-5fe6-4e36-b294-b29896088f83.png" alt="Ryder McCoy Southern Gothic field report artwork" className="w-full h-auto opacity-85" />
          </div>
        </div>
      </section>

      <section id="band" className="relative py-16 sm:py-24">
        <div className="max-w-6xl mx-auto px-5 sm:px-8">
          <SectionLabel eyebrow="The Band" title="THREE VOICES" />
          <div className="mt-10 grid md:grid-cols-3 gap-5">
            {PEOPLE.map(p => (
              <article key={p.name} className="rounded-xl border border-clay/35 bg-[#15110f] p-6 shadow-soft hover:border-ember/70 transition-all">
                <h3 className="font-blackletter text-4xl text-ember">{p.name}</h3>
                <p className="mt-2 text-clay text-xs uppercase tracking-[0.25em]">{p.role}</p>
                <p className="mt-5 text-altar/82 leading-relaxed">{p.text}</p>
              </article>
            ))}
          </div>
        </div>
      </section>

      <section id="contact" className="relative py-20 sm:py-28 border-t border-clay/25 text-center">
        <div className="max-w-3xl mx-auto px-5 sm:px-8">
          <p className="uppercase tracking-[0.30em] text-ember text-xs mb-4">Booking & Press</p>
          <h2 className="font-blackletter text-5xl sm:text-6xl text-altar">GET IN TOUCH</h2>
          <p className="mt-6 text-altar/78 leading-relaxed text-lg">Shows, press, licensing, or anything else — reach the label directly.</p>
          <a href="mailto:biloxibluesrecords@gmail.com" className="mt-8 inline-block px-8 py-4 border border-ember text-altar uppercase tracking-[0.16em] text-sm hover:bg-ember hover:text-night transition-all">Email Biloxi Blues Records</a>
        </div>
      </section>

      <footer className="border-t border-clay/35 py-10 text-center text-clay text-sm">
        <div className="font-blackletter text-2xl text-altar mb-3">Biloxi Blues Records</div>
        <p>The Ryder McCoy Band · Slapout, Alabama</p>
        <p className="mt-4 text-clay/75">© {new Date().getFullYear()} Biloxi Blues Records. The album is free to download and share for personal listening. Backroads know.</p>
      </footer>

      {playerOpen && (
        <div className="fixed left-0 right-0 bottom-0 z-[60] bg-night/96 backdrop-blur border-t border-ember/30 shadow-[0_-10px_35px_rgba(0,0,0,0.65)]">
          <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 flex items-center gap-3">
            <button onClick={() => setPlayerOpen(false)} className="hidden sm:flex h-9 w-9 items-center justify-center border border-clay/35 rounded text-clay hover:text-ember hover:border-ember">×</button>
            <div className="min-w-0 flex-1">
              <div className="text-[10px] uppercase tracking-[0.24em] text-ember">Now Playing</div>
              <div className="text-altar font-bold truncate">{nowPlaying.no}. {nowPlaying.title}</div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <button onClick={playPrevious} className="h-10 w-10 border border-clay/35 rounded hover:border-ember hover:text-ember">⏮</button>
              <button onClick={togglePlayback} className="h-11 w-14 bg-blood rounded shadow-glow hover:bg-altar hover:text-sinner">{isPlaying ? '❚❚' : '▶'}</button>
              <button onClick={playNext} className="h-10 w-10 border border-clay/35 rounded hover:border-ember hover:text-ember">⏭</button>
              <a href={nowPlaying.audio} download className="hidden sm:flex h-10 w-10 border border-clay/35 rounded items-center justify-center hover:border-ember hover:text-ember">⇩</a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SectionLabel({ eyebrow, title }) {
  return (
    <div>
      <p className="uppercase tracking-[0.30em] text-ember text-xs">{eyebrow}</p>
      <h2 className="font-blackletter text-5xl sm:text-6xl lg:text-7xl text-altar mt-4 leading-none">{title}</h2>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
